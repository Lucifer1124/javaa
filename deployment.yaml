apiVersion: apps/v1
kind: Deployment
metadata:
  name: automated-java-deploy
  labels:
    app: automated-java-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: automated-java-web
  template:
    metadata:
      labels:
        app: automated-java-web
    spec:
      containers:
      - name: web-container
        image: lucifer1124/k8s-automated-pipeline:latest
        ports:
        - containerPort: 8081
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: automated-java-service
spec:
  type: NodePort
  selector:
    app: automated-java-web
  ports:
  - port: 8081
    targetPort: 8081
    nodePort: 32080